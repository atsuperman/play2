<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Music Player</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to bottom, #ffffff, #d1d1d1);
    }

    .circle-container {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff, #ccc);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gesture-area {
      position: absolute;
      height: 50%;
      width: 50%;
      background: transparent;
      transition: background 0.3s;
    }

    .left {
      top: 0;
      left: 0;
      border-radius: 150px 0 0 150px;
    }

    .right {
      top: 0;
      right: 0;
      border-radius: 0 150px 150px 0;
    }

    .bottom {
      bottom: 0;
      left: 25%;
      height: 25%;
      width: 50%;
      border-radius: 0 0 150px 150px;
    }

    .bottom.playing {
      background: green;
    }

    .bottom.paused {
      background: black;
    }

    .gesture-area.clicked {
      background: orange;
    }
  </style>
</head>
<body>
  <div class="circle-container">
    <!-- Gesture Areas -->
    <div class="gesture-area left" id="prev"></div>
    <div class="gesture-area right" id="next"></div>
    <div class="gesture-area bottom" id="play-pause"></div>
  </div>

  <script>
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const playPause = document.getElementById('play-pause');
    let isPlaying = false;

    // Left Zone - Previous Gesture
    prev.addEventListener('mousedown', () => {
      prev.classList.add('clicked');
    });
    prev.addEventListener('mouseup', () => {
      prev.classList.remove('clicked');
    });

    // Right Zone - Next Gesture
    next.addEventListener('mousedown', () => {
      next.classList.add('clicked');
    });
    next.addEventListener('mouseup', () => {
      next.classList.remove('clicked');
    });

    // Bottom Zone - Play/Pause Gesture
    playPause.addEventListener('click', () => {
      isPlaying = !isPlaying;
      if (isPlaying) {
        playPause.classList.add('playing');
        playPause.classList.remove('paused');
      } else {
        playPause.classList.add('paused');
        playPause.classList.remove('playing');
      }
      setTimeout(() => {
        playPause.classList.remove('playing', 'paused');
      }, 300);
    });
  </script>
</body>
</html>
