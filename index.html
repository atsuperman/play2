<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio player</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
        }

        .vertical-line {
            position: absolute;
            left: 2%;
            top: 0;
            height: 100%;
            width: 5px;
            background-color: black;
        }

        .current-song {
            font-size: 18px;
            margin-top: 10px;
            color: #333;
            font-weight: bold;
        }

        .a-container, .b-container {
            margin-left: 6%;
            padding: 10px;
            border: 2px solid #555;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.5),
                        5px -5px 15px rgba(50, 255, 50, 0.2);
        }

        .b-container {
            background-color: skyblue;
            color: #33ff33;
            font-family: 'Poppins', sans-serif;
            text-shadow: 0 0 5px #33ff33, 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .icon {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .icon:hover {
            transform: scale(1.2);
        }

        #searchBoxContainer {
            display: none;
            transition: width 0.3s ease;
        }

        #searchBox {
            width: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
        }
    
#switch {
    cursor: pointer;
    transition: transform 0.3s ease;
}

#toggle {
    transition: cx 0.3s ease;
}
  
  
  #songQueue h4 {
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    color: #333;
}

#songList::-webkit-scrollbar {
    width: 8px;
}

#songList::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 5px;
}

#songList::-webkit-scrollbar-thumb:hover {
    background: #aaa;
}
  
        @media screen and (max-width: 768px) {
            .a-container, .b-container {
                width: 90%;
                max-width: none;
                font-size: 0.9rem;
            }

            .icon-row .icon {
                font-size: 1.2rem;
            }

            .b-container {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="vertical-line"></div>
    <!-- A-container for Play/Pause toggle -->
    <div class="a-container">
       <div class="icon-row">
    <span class="icon" id="play-pause">
        <svg width="24" height="24" viewBox="0 0 24 24">
            <path id="play-path" d="M8 5v14l11-7z" />
            <path id="pause-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;" />
        </svg>
    </span>
   <span class="icon" id="next">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
        <path d="M4 4v16l12-8-12-8zm14 0h2v16h-2z"></path>
    </svg>
</span>
<span class="icon" id="search">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
        <path d="M21.71 20.29l-5.37-5.37A7.92 7.92 0 0 0 18 10a8 8 0 1 0-8 8 7.92 7.92 0 0 0 4.92-1.66l5.37 5.37a1 1 0 0 0 1.42-1.42ZM10 16a6 6 0 1 1 6-6 6 6 0 0 1-6 6Z"></path>
    </svg>
</span>
           <span class="icon" id="list">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
        <path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z"></path>
    </svg>
</span>
       <span class="icon" id="switch">
    <svg width="50" height="24" viewBox="0 0 50 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="50" height="24" rx="12" fill="#E0E0E0"/>
        <circle id="toggle" cx="6" cy="12" r="6" fill="#000000"/>
    </svg>
</span>
            <div id="searchBoxContainer">
            <input type="text" id="searchBox" placeholder="Search songs..." />
              
        </div>
</div>
      
    </div>
    <!-- B-container left empty -->
 <div class="b-container">
    <div id="currentSong">
        <div style="display: flex; align-items: center; margin-bottom: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#007BFF" style="margin-right: 5px;">
                <path d="M12 3v18l9-9-9-9zm-9 9h7v-2H3v2zm0 4h7v-2H3v2zm0-8h7V7H3v2z"></path>
            </svg>
            <div id="currentSongName" style="font-weight: bold; color: #007BFF;"></div>
        </div>
        <div style="display: flex; align-items: center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#555" style="margin-right: 5px;">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm1 15h-2v-2h2Zm0-4h-2V7h2Z"></path>
            </svg>
            <div id="songDetails" style="font-size: 14px; color: #007BFF;"></div>
        </div>
    </div>
   <div id="songQueue" style="display: none; margin-top: 20px;">
    <h4 style="margin-bottom: 10px; color: #555;">Coming Songs</h4>
    <div id="songList" style="max-height: 200px; overflow-y: auto; border: 1px solid #ccc; border-radius: 5px; padding: 10px; background: #f9f9f9;">
        <!-- Songs will be dynamically populated here -->
    </div>
</div>
</div> 
      <audio id="audioPlayer">
        Your browser does not support the audio element.
    </audio>

 <script type="module">
    import { allSongs } from './audioFiles.js';

let isPlaying = false;  // Track if the song is currently playing
    let currentSongIndex = 0; // Track the current song
    const audioPlayer = document.getElementById("audioPlayer");
    const playPath = document.getElementById("play-path");
    const pausePath = document.getElementById("pause-path");
    const currentSongDisplay = document.getElementById("currentSong");

    // Shuffle the playlist
    function shuffleSongs() {
        for (let i = allSongs.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allSongs[i], allSongs[j]] = [allSongs[j], allSongs[i]];
        }
    }

    // Load the current song
    function loadCurrentSong() {
        const song = allSongs[currentSongIndex];
        audioPlayer.src = song.path;
        const currentSongName = song.file.replace(".mp3", "").replace(/_/g, " ");
        document.getElementById("currentSongName").textContent = currentSongName;
        document.getElementById("songDetails").textContent = song.details;
    }

    // Start playback of the current song
    function playCurrentSong() {
        audioPlayer.play();
        playPath.style.display = "none";
        pausePath.style.display = "block";
    }

    // Pause playback
    function pauseCurrentSong() {
        audioPlayer.pause();
        playPath.style.display = "block";
        pausePath.style.display = "none";
    }

    // Toggle Play/Pause
function togglePlayPause() {
    if (audioPlayer.paused) {
        playCurrentSong();
        isPlaying = true;  // Mark as playing
    } else {
        pauseCurrentSong();
        isPlaying = false;  // Mark as paused
    }
}

// Event listener for the Next button
document.getElementById("next").addEventListener("click", () => {
    if (isPlaying) {
        playNextSong();  // Play next song only if already playing
    } else {
        currentSongIndex++; // Just move to the next song, but don't play yet
        if (currentSongIndex >= allSongs.length) {
            shuffleSongs();  // Shuffle the playlist again
            currentSongIndex = 0;  // Restart from the first song
        }
        loadCurrentSong();  // Load the next song details
    }
});

    // Advance to the next song
    function playNextSong() {
        currentSongIndex++;
        if (currentSongIndex >= allSongs.length) {
            shuffleSongs(); // Shuffle the playlist again
            currentSongIndex = 0; // Restart from the first song
        }
        loadCurrentSong();
        playCurrentSong();
    }

    // Event listener for the Play/Pause toggle
    document.getElementById("play-pause").addEventListener("click", () => {
        if (!audioPlayer.src) {
            loadCurrentSong(); // Load the first song on initial Play click
        }
        togglePlayPause();
    });

    // Automatically play the next song when the current one ends
    audioPlayer.addEventListener("ended", playNextSong);

    // Shuffle songs on page load
    shuffleSongs();
  
const searchIcon = document.getElementById("search");
const searchBoxContainer = document.getElementById("searchBoxContainer");
const searchBox = document.getElementById("searchBox");
const otherIcons = Array.from(document.querySelectorAll(".icon")).filter(
    icon => icon.id !== "search"
);

// Toggle search functionality
let searchTimeout; // Timeout for auto-hide

searchIcon.addEventListener("click", () => {
    if (searchBoxContainer.style.display === "none" || !searchBoxContainer.style.display) {
        // Show search box
        searchBoxContainer.style.display = "block";
        searchBox.value = ""; // Reset the input box

        // Reset auto-hide timer
        resetSearchTimeout();
    } else {
        // Hide search box and reset input
        hideSearchBox();
    }
});

// Function to hide the search box
function hideSearchBox() {
    searchBoxContainer.style.display = "none";
    searchBox.value = ""; // Reset the input box
    otherIcons.forEach(icon => {
        icon.style.display = "inline-block"; // Show all other icons
    });
}

// Reset the auto-hide timer for the search box
function resetSearchTimeout() {
    clearTimeout(searchTimeout); // Clear existing timer
    searchTimeout = setTimeout(() => {
        if (!searchBox.value.trim()) { // Hide only if input is empty
            hideSearchBox();
        }
    }, 30000); // 30-second timer
}

// Reset the timer whenever the user types
searchBox.addEventListener("input", resetSearchTimeout);
  
let isSwitched = false; // Track the switch position

document.getElementById("switch").addEventListener("click", () => {
    const toggle = document.getElementById("toggle");
    
    if (isSwitched) {
        toggle.setAttribute("cx", "6"); // Move toggle to the left
    } else {
        toggle.setAttribute("cx", "44"); // Move toggle to the right
    }
    
    isSwitched = !isSwitched; // Toggle the state
});
  
// Reference to the song queue container and list
const songQueue = document.getElementById("songQueue");
const songList = document.getElementById("songList");
let queueTimeout; // Timeout for auto-hide

function updateSongQueue() {
    songList.innerHTML = ""; // Clear the existing queue

    // Get the next 100 songs (from the current index onwards)
    const queue = allSongs.slice(currentSongIndex + 1, currentSongIndex + 101);

    // Display up to 7 songs at a time
    queue.slice(0, 7).forEach((song) => {
    const songDiv = document.createElement("div");
    songDiv.textContent = `• ${song.file.replace(".mp3", "").replace(/_/g, " ")}`;
    songDiv.style.marginBottom = "5px";
    songDiv.style.color = "#007BFF";
    songDiv.style.cursor = "default"; // No interaction
    songDiv.style.fontSize = "14px";

    songList.appendChild(songDiv);
});
}

// Function to toggle song queue visibility
function toggleSongQueue() {
    if (songQueue.style.display === "none" || !songQueue.style.display) {
        songQueue.style.display = "block"; // Show the queue
        updateSongQueue(); // Update the list
        resetQueueTimeout(); // Reset auto-hide timer
    } else {
        songQueue.style.display = "none"; // Hide the queue
    }
}

// Hide song queue and reset timer
function hideSongQueue() {
    songQueue.style.display = "none";
    clearTimeout(queueTimeout); // Clear auto-hide timer
}

// Auto-hide the queue after 30 seconds of inactivity
function resetQueueTimeout() {
    clearTimeout(queueTimeout); // Clear existing timer
    queueTimeout = setTimeout(hideSongQueue, 30000); // Set 30-second timer
}

// Add click event listener to the list icon
document.getElementById("list").addEventListener("click", toggleSongQueue);

// Hide song queue if any other icon is clicked
document.querySelectorAll(".icon").forEach(icon => {
    if (icon.id !== "list") {
        icon.addEventListener("click", hideSongQueue);
    }
});
// Automatically update the queue when the song changes
audioPlayer.addEventListener("ended", () => {
    playNextSong(); // Play the next song
    updateSongQueue(); // Update the queue dynamically
});

// Update the queue whenever "Next" is clicked
document.getElementById("next").addEventListener("click", () => {
    updateSongQueue(); // Refresh the queue when moving to the next song
});
  
    </script>
</body>
</html>
