<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Circular Audio Player</title>
  <link id="favicon" rel="icon" href="https://github.com/atsuperman/PLAY/raw/refs/heads/main/file-9vkiZZ9FGePFPoJPonPkoP.webp" type="image/x-icon">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffffff, #d1d1d1);
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .circle-container {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff, #ccc);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .progress-bar {
      position: absolute;
      height: 5px;
      background: linear-gradient(90deg, #80deea, #007bff);
      border-radius: 10px;
      transition: width 2s ease-in-out, transform 2s ease-in-out;
      transform-origin: center;
      z-index: 2;
    }

    .points {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #007bff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease-in-out;
    }

    .points.selected {
      animation: blink-border 1s infinite alternate;
    }

    @keyframes blink-border {
      0% { box-shadow: 0 0 10px #ff00ff; background: #ff00ff; }
      50% { box-shadow: 0 0 15px #00ff00; background: #00ff00; }
      100% { box-shadow: 0 0 10px #0000ff; background: #0000ff; }
    }

    .points .emoji {
      font-size: 10px;
      color: white;
      pointer-events: none;
    }

    .points.selected .emoji {
      animation: blink-colors 1s infinite alternate;
    }

    @keyframes blink-colors {
      0% { color: #ff0000; }
      25% { color: #00ff00; }
      50% { color: #0000ff; }
      75% { color: #ff00ff; }
      100% { color: #ffff00; }
    }

    .point-name {
      position: absolute;
      font-size: 16px;
      font-weight: bold;
      color: #007bff;
      opacity: 1;
      transition: transform 0.6s ease-in-out, opacity 0.6s ease-in-out;
      transform: scale(1);
      text-align: center;
      line-height: 1;
      vertical-align: middle;
      white-space: nowrap;
    }

    .point-name.fade-in {
      transform: scale(1.2);
      opacity: 0;
    }

    iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
      display: none;
    }
  </style>
</head>
<body>
  <div class="circle-container">
    <div class="progress-bar"></div>
    <div class="points" data-audio="https://thaalam.fm/" data-name="Vipes">
      <div class="emoji">🎵</div>
    </div>
    <div class="points" data-audio="https://shakthifm.com/" data-name="Melody">
      <div class="emoji">🎵</div>
    </div>
    <div class="points" data-audio="https://www.melisten.sg/radio/oli-968" data-name="Hits">
      <div class="emoji">🎵</div>
    </div>
    <div class="points" data-name="Empty">
      <div class="emoji">🎵</div>
    </div>
    <div class="points" data-name="Empty">
      <div class="emoji">🎵</div>
    </div>
    <div id="point-name" class="point-name">🔵 CLICK ANY MUSIC POINTS</div>
    <iframe id="iframe" src="" frameborder="0"></iframe>
  </div>

  <script>
    const points = document.querySelectorAll('.points');
    const pointNameElement = document.getElementById('point-name');
    const progressBar = document.querySelector('.progress-bar');
    let audio = new Audio();
    let currentlyPlaying = null;
    let currentIndex = -1;
    const iframe = document.getElementById('iframe');

    const audioData = [
      { name: "Vipes", audio: "https://thaalam.fm/" },
      { name: "Melody", audio: "https://shakthifm.com/" },
      { name: "Hits", audio: "https://www.melisten.sg/radio/oli-968" },
      { name: "Empty", audio: null },
      { name: "Empty", audio: null },
    ];

    function calculatePointPositions() {
      const circleRadius = 140;
      const totalPoints = points.length;
      const angleStep = 360 / totalPoints;

      points.forEach((point, index) => {
        const angle = angleStep * index;
        const x = circleRadius * Math.cos((angle - 90) * (Math.PI / 180));
        const y = circleRadius * Math.sin((angle - 90) * (Math.PI / 180));
        point.style.transform = `translate(${x}px, ${y}px)`;
      });
    }

    calculatePointPositions();

    points.forEach((point, index) => {
      point.addEventListener('click', () => selectPoint(index));
    });

    function selectPoint(index) {
      const point = points[index];
      if (!audioData[index].audio) return;

      if (currentIndex === index) {
        stopAudio();
      } else {
        currentIndex = index;
        points.forEach(p => p.classList.remove('selected'));
        point.classList.add('selected');

        showProgress(index);

        pointNameElement.textContent = audioData[index].name;
        pointNameElement.classList.add('fade-in');
        setTimeout(() => pointNameElement.classList.remove('fade-in'), 600);

        document.title = audioData[index].name;

        if (currentlyPlaying) {
          audio.pause();
        }

        audio.src = audioData[index].audio;
        audio.play();

        audio.addEventListener('playing', hideProgress);

        iframe.src = audioData[index].audio;
        iframe.style.display = 'block';

        currentlyPlaying = point;
        updateMediaSession();
      }
    }

    function stopAudio() {
      if (currentlyPlaying) {
        audio.pause();
        audio.currentTime = 0;
        currentlyPlaying.classList.remove('selected');
        currentlyPlaying = null;
        currentIndex = -1;
        pointNameElement.textContent = "🔵 CLICK ANY MUSIC POINTS";
        pointNameElement.classList.add('fade-in');
        setTimeout(() => pointNameElement.classList.remove('fade-in'), 600);
        hideProgress();
        iframe.style.display = 'none';
      }
    }

    function showProgress(index) {
      const angle = (index * 360) / points.length - 90;
      progressBar.style.width = '80%';
      progressBar.style.transform = `rotate(${angle}deg)`;
    }

    function hideProgress() {
      progressBar.style.width = '0';
    }

    function updateMediaSession() {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: audioData[currentIndex]?.name,
          artwork: [
            { src: "https://github.com/atsuperman/PLAY/raw/refs/heads/main/file-9vkiZZ9FGePFPoJPonPkoP.webp", sizes: '96x96', type: 'image/webp' }
          ]
        });

        navigator.mediaSession.setActionHandler('play', () => selectPoint(currentIndex));
        navigator.mediaSession.setActionHandler('pause', stopAudio);
        navigator.mediaSession.setActionHandler('nexttrack', () => selectNextPoint());
        navigator.mediaSession.setActionHandler('previoustrack', () => selectPreviousPoint());
      }
    }

    function selectNextPoint() {
      let nextIndex = (currentIndex + 1) % audioData.length;
      if (!audioData[nextIndex].audio) nextIndex = (nextIndex + 1) % audioData.length;
      selectPoint(nextIndex);
    }

    function selectPreviousPoint() {
      let prevIndex = (currentIndex - 1 + audioData.length) % audioData.length;
      if (!audioData[prevIndex].audio) prevIndex = (prevIndex - 1 + audioData.length) % audioData.length;
      selectPoint(prevIndex);
    }

    audio.addEventListener('ended', stopAudio);
  </script>
</body>
  </html>
