<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player with Song Name</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to bottom, #ffffff, #d1d1d1);
      font-family: Arial, sans-serif;
    }

    /* Circle Container */
    .circle-container {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff, #d1d1d1);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Division Styles */
    .division {
      position: absolute;
      width: 33.33%;
      height: 100%;
      top: 0;
      transition: background 0.3s ease;
    }

    .left {
      left: 0;
    }

    .center {
      left: 33.33%;
    }

    .right {
      left: 66.66%;
    }

    /* Clicked Colors */
    .clicked-prev {
      background: orange !important;
    }

    .clicked-next {
      background: orange !important;
    }

    .clicked-play {
      background: green !important;
    }

    .clicked-pause {
      background: black !important;
    }

    /* Function Name Display */
    .function-display {
      position: absolute;
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .function-display.show {
      opacity: 1;
    }

    /* Song Name */
    .song-name {
      position: absolute;
      font-size: 1.2rem;
      font-weight: bold;
      color: #555;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="circle-container">
    <div class="division left" id="prev"></div>
    <div class="division center" id="play-pause"></div>
    <div class="division right" id="next"></div>
    <div id="function-text" class="function-display"></div>
    <div id="song-name" class="song-name"></div>
  </div>

  <script src="audio-files.js"></script>
  <script>
    let currentIndex = Math.floor(Math.random() * audioFiles.length);
    let isPlaying = false;
    const audio = new Audio(audioFiles[currentIndex]);

    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const playPause = document.getElementById('play-pause');
    const functionText = document.getElementById('function-text');
    const songName = document.getElementById('song-name');

    // Initialize the song name display
    songName.textContent = "";

    // Add Touch Listeners
    prev.addEventListener('click', () => handleGesture('prev'));
    next.addEventListener('click', () => handleGesture('next'));
    playPause.addEventListener('click', () => handleGesture('play-pause'));

    // Handle Gestures
    function handleGesture(action) {
      resetColors();
      switch (action) {
        case 'prev':
          prev.classList.add('clicked-prev');
          showFunctionText('Prev');
          playPrevious();
          break;
        case 'next':
          next.classList.add('clicked-next');
          showFunctionText('Next');
          playNext();
          break;
        case 'play-pause':
          if (isPlaying) {
            playPause.classList.add('clicked-pause');
            showFunctionText('Pause');
            audio.pause();
            isPlaying = false;
          } else {
            playPause.classList.add('clicked-play');
            showFunctionText('Play');
            audio.play();
            isPlaying = true;
          }
          break;
      }
      updateSongName();
      autoHideColors();
    }

    // Play Next Track
    function playNext() {
      currentIndex = (currentIndex + 1) % audioFiles.length;
      audio.src = audioFiles[currentIndex];
      if (isPlaying) audio.play();
    }

    // Play Previous Track
    function playPrevious() {
      currentIndex = (currentIndex - 1 + audioFiles.length) % audioFiles.length;
      audio.src = audioFiles[currentIndex];
      if (isPlaying) audio.play();
    }

    // Reset Colors
    function resetColors() {
      prev.classList.remove('clicked-prev');
      next.classList.remove('clicked-next');
      playPause.classList.remove('clicked-play', 'clicked-pause');
    }

    // Auto Hide Colors
    function autoHideColors() {
      setTimeout(() => resetColors(), 500);
    }

    // Show Function Text
    function showFunctionText(text) {
      functionText.textContent = text;
      functionText.classList.add('show');
      setTimeout(() => functionText.classList.remove('show'), 500);
    }

    // Update Song Name
    function updateSongName() {
      if (isPlaying) {
        const fileName = audio.src.split('/').pop().split('?')[0];
        songName.textContent = fileName || "";
      } else {
        songName.textContent = "";
      }
    }

    // Auto Next on End
    audio.addEventListener('ended', () => {
      playNext();
      updateSongName();
    });
  </script>
</body>
</html>
