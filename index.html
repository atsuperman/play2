<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified MP3 Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f9f9f9;
        }
        .current-song {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
        }
        .player-container {
            display: inline-block;
            padding: 20px;
            border: 2px solid #007BFF;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        audio {
            display: none; /* Hide the default audio controls */
        }
    </style>
</head>
<body>
    <h1>Unified Audio Player</h1>
    <div class="current-song" id="currentSong">Now Playing: </div>
    <div class="player-container">
        <div class="controls">
            <button id="playPauseButton">Play</button>
            <button id="nextButton">Next</button>
        </div>
    </div>

    <audio id="audioPlayer">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { allSongs } from './audioFiles.js';

        let currentSongIndex = 0; // Keep track of the current song
        const audioPlayer = document.getElementById("audioPlayer");
        const playPauseButton = document.getElementById("playPauseButton");
        const nextButton = document.getElementById("nextButton");
        const currentSongDisplay = document.getElementById("currentSong");

        // Load the current song and update display
        function loadCurrentSong() {
            audioPlayer.src = allSongs[currentSongIndex];
            currentSongDisplay.textContent = `Now Playing: ${allSongs[currentSongIndex].split('/').pop()}`;
            audioPlayer.play();
            playPauseButton.textContent = "Pause"; // Update button to Pause
        }

        // Toggle play/pause
        function togglePlayPause() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseButton.textContent = "Pause";
            } else {
                audioPlayer.pause();
                playPauseButton.textContent = "Play";
            }
        }

        // Play the next song
        function playNextSong() {
            currentSongIndex = (currentSongIndex + 1) % allSongs.length; // Loop back to the first song
            loadCurrentSong();
        }

        // Event listeners
        playPauseButton.addEventListener("click", togglePlayPause);
        nextButton.addEventListener("click", playNextSong);

        // Automatically play the next song when the current one ends
        audioPlayer.addEventListener("ended", playNextSong);

        // Handle errors while loading songs
        audioPlayer.onerror = () => {
            alert("Error loading song. Skipping to the next one...");
            playNextSong();
        };

        // Keyboard shortcuts for navigation
        document.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight") playNextSong(); // Next song
        });

        // Load the initial song
        loadCurrentSong();
    </script>
</body>
</html>
