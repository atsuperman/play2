<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Music Player</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to bottom, #ffffff, #d1d1d1);
      font-family: Arial, sans-serif;
    }

    /* Circle Container */
    .circle-container {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff, #d1d1d1);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      overflow: hidden;
    }

    /* Gesture Divisions */
    .division {
      position: absolute;
      top: 0;
      height: 100%;
      width: 33.33%;
      transition: background 0.5s ease-in-out;
    }

    .left {
      left: 0;
    }

    .center {
      left: 33.33%;
    }

    .right {
      right: 0;
    }

    /* Colors */
    .clicked {
      background: orange;
    }

    .playing {
      background: green;
    }

    .paused {
      background: black;
    }

    /* File Name Display */
    #file-name {
      position: absolute;
      color: #333;
      word-wrap: break-word;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="circle-container" id="circle">
    <!-- Vertical Divisions -->
    <div class="division left" id="prev"></div>
    <div class="division center" id="play-pause"></div>
    <div class="division right" id="next"></div>
    <div id="file-name"></div>
  </div>

  <script src="audio-files.js"></script>
  <script>
    let currentIndex = Math.floor(Math.random() * audioFiles.length);
    let isPlaying = false;
    const audio = new Audio(audioFiles[currentIndex]);
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const playPause = document.getElementById('play-pause');
    const fileNameDisplay = document.getElementById('file-name');

    // Initialize Player
    updateFileName("");

    // Left Division - Previous
    prev.addEventListener('click', () => {
      resetColors();
      prev.classList.add('clicked');
      playPrevious();
      autoHideColors();
    });

    // Right Division - Next
    next.addEventListener('click', () => {
      resetColors();
      next.classList.add('clicked');
      playNext();
      autoHideColors();
    });

    // Center Division - Play/Pause
    playPause.addEventListener('click', () => {
      resetColors();
      togglePlayPause();
      autoHideColors();
    });

    // Play/Pause Function
    function togglePlayPause() {
      if (isPlaying) {
        audio.pause();
        playPause.classList.add('paused');
        isPlaying = false;
        updateFileName("");
      } else {
        audio.play();
        playPause.classList.add('playing');
        isPlaying = true;
        updateFileName(decodeURIComponent(audio.src).split('/').pop().replace(/\.[^/.]+$/, ''));
      }
    }

    // Play Next Track
    function playNext() {
      currentIndex = (currentIndex + 1) % audioFiles.length;
      startPlaying();
    }

    // Play Previous Track
    function playPrevious() {
      currentIndex = (currentIndex - 1 + audioFiles.length) % audioFiles.length;
      startPlaying();
    }

    // Start Playing Track
    function startPlaying() {
      audio.src = audioFiles[currentIndex];
      audio.play();
      isPlaying = true;
      resetColors();
      playPause.classList.add('playing');
      updateFileName(decodeURIComponent(audio.src).split('/').pop().replace(/\.[^/.]+$/, ''));
    }

    // Auto Next Track on End
    audio.addEventListener('ended', () => {
      playNext();
    });

    // Update File Name Display
    function updateFileName(name) {
      fileNameDisplay.textContent = name || "No Track Playing";
    }

    // Reset Colors
    function resetColors() {
      prev.classList.remove('clicked');
      next.classList.remove('clicked');
      playPause.classList.remove('playing', 'paused');
    }

    // Auto Hide Colors
    function autoHideColors() {
      setTimeout(() => resetColors(), 1000);
    }
  </script>
</body>
</html>
