<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Audio Player</title>
    <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f4f4f4;
      overflow: hidden;
    }

    .vertical-line {
      position: absolute;
      left: 2%;
      top: 0;
      height: 100%;
      width: 5px;
      background-color: black;
    }

        .current-song {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
        }

        .a-container, .b-container {
            margin-left: 6%;
            padding: 10px;
            border: 2px solid #555;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.5),
                        5px -5px 15px rgba(50, 255, 50, 0.2);
        }

        .b-container {
            background-color: #1e1e1e;
            color: #33ff33;
            font-family: 'Poppins', sans-serif;
            text-shadow: 0 0 5px #33ff33, 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        .play-pause-icon {
            font-size: 24px;
            cursor: pointer;
            color: #007BFF;
            transition: color 0.3s ease;
        }

        .play-pause-icon:hover {
            color: #0056b3;
        }
    @media screen and (max-width: 768px) {
      .a-container, .b-container {
        width: 90%;
        max-width: none;
        font-size: 0.9rem;
      }

      .icon-row .icon {
        font-size: 1.2rem;
      }

      .a-text {
        font-size: 1rem;
      }

      .b-container {
        font-size: 1rem;
      }
    }
    </style>
</head>
<body>
    <h1>Unified Audio Player</h1>
  <div class="vertical-line"></div>
    <!-- A-container for Play/Pause toggle -->
    <div class="a-container">
        <div class="icon-row">
    <span class="icon" id="play-pause">
        <svg width="24" height="24" viewBox="0 0 24 24">
            <path id="play-path" d="M8 5v14l11-7z" /> 
            <path id="pause-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;" />
        </svg>
    </span>
    <span class="icon" id="next">
        <svg width="24" height="24" viewBox="0 0 24 24">
            <path d="M10 6l6 6-6 6z" />
        </svg>
    </span>
</div>
    <!-- B-container left empty -->
    <div class="b-container"></div>

    <audio id="audioPlayer">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { allSongs } from './audioFiles.js';

        let currentSongIndex = 0; // Keep track of the current song
        const audioPlayer = document.getElementById("audioPlayer");
        const playPauseIcon = document.getElementById("playPauseIcon");
        const currentSongDisplay = document.getElementById("currentSong");

        // Load the current song and update display
        function loadCurrentSong() {
            audioPlayer.src = allSongs[currentSongIndex];
            currentSongDisplay.textContent = `Now Playing: ${allSongs[currentSongIndex].split('/').pop()}`;
            audioPlayer.play();
            playPauseIcon.textContent = "⏸"; // Switch to Pause icon
        }

        // Toggle Play/Pause functionality
        function togglePlayPause() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseIcon.textContent = "⏸"; // Pause icon
            } else {
                audioPlayer.pause();
                playPauseIcon.textContent = "▶"; // Play icon
            }
        }

        // Automatically load the next song when the current one ends
        audioPlayer.addEventListener("ended", () => {
            currentSongIndex = (currentSongIndex + 1) % allSongs.length;
            loadCurrentSong();
        });

        // Handle errors during song playback
        audioPlayer.onerror = () => {
            alert("Error loading song. Skipping to the next one...");
            currentSongIndex = (currentSongIndex + 1) % allSongs.length;
            loadCurrentSong();
        };

        // Event listener for Play/Pause toggle
        playPauseIcon.addEventListener("click", togglePlayPause);

        // Load the initial song
        loadCurrentSong();
    </script>
</body>
</html>
