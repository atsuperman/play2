<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Circle Music Player</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to bottom, #ffffff, #d1d1d1);
      font-family: Arial, sans-serif;
    }

    /* Circle Container */
    .circle-container {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff, #d1d1d1);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Division Styles */
    .division {
      position: absolute;
      width: 100%;
      height: 100%;
      clip-path: polygon(0 0, 50% 50%, 0 100%);
      transform-origin: center;
      transition: background 0.3s ease;
    }

    .left {
      background: transparent;
      transform: rotate(-90deg);
    }

    .center {
      background: transparent;
      clip-path: polygon(0 0, 100% 0, 50% 50%, 100% 100%, 0 100%);
    }

    .right {
      background: transparent;
      transform: rotate(90deg);
    }

    /* Colors on Click */
    .clicked-prev {
      background: orange !important;
    }

    .clicked-next {
      background: orange !important;
    }

    .clicked-play {
      background: green !important;
    }

    .clicked-pause {
      background: black !important;
    }
  </style>
</head>
<body>
  <div class="circle-container">
    <div class="division left" id="prev"></div>
    <div class="division center" id="play-pause"></div>
    <div class="division right" id="next"></div>
  </div>

  <script src="audio-files.js"></script>
  <script>
    let currentIndex = Math.floor(Math.random() * audioFiles.length);
    let isPlaying = false;
    const audio = new Audio(audioFiles[currentIndex]);

    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const playPause = document.getElementById('play-pause');

    // Add Touch Listeners
    prev.addEventListener('click', () => handleGesture('prev'));
    next.addEventListener('click', () => handleGesture('next'));
    playPause.addEventListener('click', () => handleGesture('play-pause'));

    // Handle Gestures
    function handleGesture(action) {
      resetColors();
      switch (action) {
        case 'prev':
          prev.classList.add('clicked-prev');
          playPrevious();
          break;
        case 'next':
          next.classList.add('clicked-next');
          playNext();
          break;
        case 'play-pause':
          if (isPlaying) {
            playPause.classList.add('clicked-pause');
            audio.pause();
            isPlaying = false;
          } else {
            playPause.classList.add('clicked-play');
            audio.play();
            isPlaying = true;
          }
          break;
      }
      autoHideColors();
    }

    // Play Next Track
    function playNext() {
      currentIndex = (currentIndex + 1) % audioFiles.length;
      audio.src = audioFiles[currentIndex];
      if (isPlaying) audio.play();
    }

    // Play Previous Track
    function playPrevious() {
      currentIndex = (currentIndex - 1 + audioFiles.length) % audioFiles.length;
      audio.src = audioFiles[currentIndex];
      if (isPlaying) audio.play();
    }

    // Reset Colors
    function resetColors() {
      prev.classList.remove('clicked-prev');
      next.classList.remove('clicked-next');
      playPause.classList.remove('clicked-play', 'clicked-pause');
    }

    // Auto Hide Colors
    function autoHideColors() {
      setTimeout(() => resetColors(), 1000);
    }

    // Auto Next on End
    audio.addEventListener('ended', () => {
      playNext();
    });
  </script>
</body>
</html>
