<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Music Player</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to bottom, #ffffff, #d1d1d1);
    }

    /* Circle Container */
    .circle-container {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff, #d1d1d1);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Divisions */
    .division {
      position: absolute;
      width: 50%;
      height: 50%;
      background: transparent;
      transition: background 0.3s;
    }

    .left {
      top: 0;
      left: 0;
      border-top-left-radius: 100%;
    }

    .right {
      top: 0;
      right: 0;
      border-top-right-radius: 100%;
    }

    .bottom {
      bottom: 0;
      left: 25%;
      width: 50%;
      height: 50%;
      border-bottom-left-radius: 50%;
      border-bottom-right-radius: 50%;
    }

    /* Colors */
    .clicked {
      background: orange;
    }

    .playing {
      background: green;
    }

    .paused {
      background: black;
    }
  </style>
</head>
<body>
  <div class="circle-container">
    <!-- Gesture Divisions -->
    <div class="division left" id="prev"></div>
    <div class="division right" id="next"></div>
    <div class="division bottom" id="play-pause"></div>
  </div>

  <script>
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const playPause = document.getElementById('play-pause');
    let isPlaying = false;

    // Left Division - Previous
    prev.addEventListener('click', () => {
      resetColors();
      prev.classList.add('clicked');
    });

    // Right Division - Next
    next.addEventListener('click', () => {
      resetColors();
      next.classList.add('clicked');
    });

    // Bottom Division - Play/Pause
    playPause.addEventListener('click', () => {
      resetColors();
      isPlaying = !isPlaying;
      if (isPlaying) {
        playPause.classList.add('playing');
      } else {
        playPause.classList.add('paused');
      }
    });

    // Reset Colors
    function resetColors() {
      prev.classList.remove('clicked');
      next.classList.remove('clicked');
      playPause.classList.remove('playing', 'paused');
    }
  </script>
</body>
</html>
