<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio player</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
        }

        .vertical-line {
            position: absolute;
            left: 2%;
            top: 0;
            height: 100%;
            width: 5px;
            background-color: black;
        }

        .current-song {
            font-size: 18px;
            margin-top: 10px;
            color: #333;
            font-weight: bold;
        }

        .a-container, .b-container {
            margin-left: 6%;
            padding: 10px;
            border: 2px solid #555;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.5),
                        5px -5px 15px rgba(50, 255, 50, 0.2);
        }

        .b-container {
            background-color: skyblue;
            color: #33ff33;
            font-family: 'Poppins', sans-serif;
            text-shadow: 0 0 5px #33ff33, 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .icon {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .icon:hover {
            transform: scale(1.2);
        }

        @media screen and (max-width: 768px) {
            .a-container, .b-container {
                width: 90%;
                max-width: none;
                font-size: 0.9rem;
            }

            .icon-row .icon {
                font-size: 1.2rem;
            }

            .b-container {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="vertical-line"></div>
    <!-- A-container for Play/Pause toggle -->
    <div class="a-container">
       <div class="icon-row">
    <span class="icon" id="play-pause">
        <svg width="24" height="24" viewBox="0 0 24 24">
            <path id="play-path" d="M8 5v14l11-7z" />
            <path id="pause-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;" />
        </svg>
    </span>
   <span class="icon" id="next">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
        <path d="M4 4v16l12-8-12-8zm14 0h2v16h-2z"></path>
    </svg>
</span>
<span class="icon" id="search">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
        <path d="M21.71 20.29l-5.37-5.37A7.92 7.92 0 0 0 18 10a8 8 0 1 0-8 8 7.92 7.92 0 0 0 4.92-1.66l5.37 5.37a1 1 0 0 0 1.42-1.42ZM10 16a6 6 0 1 1 6-6 6 6 0 0 1-6 6Z"></path>
    </svg>
</span>
</div>
    </div>
    <!-- B-container left empty -->
 <div class="b-container">
    <div id="currentSong">
        <div style="display: flex; align-items: center; margin-bottom: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#007BFF" style="margin-right: 5px;">
                <path d="M12 3v18l9-9-9-9zm-9 9h7v-2H3v2zm0 4h7v-2H3v2zm0-8h7V7H3v2z"></path>
            </svg>
            <div id="currentSongName" style="font-weight: bold; color: #007BFF;"></div>
        </div>
        <div style="display: flex; align-items: center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#555" style="margin-right: 5px;">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm1 15h-2v-2h2Zm0-4h-2V7h2Z"></path>
            </svg>
            <div id="songDetails" style="font-size: 14px; color: #007BFF;"></div>
        </div>
    </div>
   <div id="searchBoxContainer" style="display: none; margin-top: 10px;">
    <input
        type="text"
        id="searchBox"
        placeholder="Search songs..."
        style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;"
    />
    <button
        id="doneButton"
        style="margin-top: 10px; width: 100%; padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer;"
    >
        Done
    </button>
</div>
</div>
      <audio id="audioPlayer">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { allSongs } from './audioFiles.js';

        let currentSongIndex = 0; // Keep track of the current song
        const audioPlayer = document.getElementById("audioPlayer");
        const playPath = document.getElementById("play-path");
        const pausePath = document.getElementById("pause-path");
        const currentSongDisplay = document.getElementById("currentSong");

        // Load the current song and update display
        function loadCurrentSong() {
    const song = allSongs[currentSongIndex];
    audioPlayer.src = song.path;
    const currentSongName = song.file.replace(".mp3", "").replace(/_/g, " ");
document.getElementById("currentSongName").textContent = currentSongName;
          
    // Display the song details
    document.getElementById("songDetails").textContent = song.details;

    audioPlayer.play();
    playPath.style.display = "none";
    pausePath.style.display = "block";
}

        // Toggle Play/Pause functionality
        function togglePlayPause() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPath.style.display = "none";
                pausePath.style.display = "block";
            } else {
                audioPlayer.pause();
                playPath.style.display = "block";
                pausePath.style.display = "none";
            }
        }

        // Automatically load the next song when the current one ends
        audioPlayer.addEventListener("ended", () => {
            currentSongIndex = (currentSongIndex + 1) % allSongs.length;
            loadCurrentSong();
        });

        // Event listener for Play/Pause toggle
        document.getElementById("play-pause").addEventListener("click", togglePlayPause);

        // Load the initial song
        loadCurrentSong();
  
  // Get references to the search icon, search box container, and done button
const searchIcon = document.getElementById("search");
const searchBoxContainer = document.getElementById("searchBoxContainer");
const doneButton = document.getElementById("doneButton");

// Toggle search box visibility when the search icon is clicked
searchIcon.addEventListener("click", () => {
    if (searchBoxContainer.style.display === "none") {
        searchBoxContainer.style.display = "block";
    } else {
        searchBoxContainer.style.display = "none";
    }
});

// Hide search box when the done button is clicked
doneButton.addEventListener("click", () => {
    searchBoxContainer.style.display = "none";
});
  
  // Add search functionality
const searchBox = document.getElementById("searchBox");

// Function to filter songs and display results
function searchSongs() {
    const query = searchBox.value.toLowerCase();
    const searchResults = allSongs.filter(song =>
        song.file.toLowerCase().includes(query) || song.details.toLowerCase().includes(query)
    );

    // Display results in the search box container
    const resultsContainer = document.createElement("div");
    resultsContainer.id = "resultsContainer";
    resultsContainer.style.marginTop = "10px";

    // Clear previous results
    if (document.getElementById("resultsContainer")) {
        document.getElementById("resultsContainer").remove();
    }

    // Add new results
    searchResults.forEach((song, index) => {
        const resultItem = document.createElement("div");
        resultItem.textContent = `${index + 1}. ${song.file} - ${song.details}`;
        resultItem.style.padding = "5px";
        resultItem.style.border = "1px solid #ccc";
        resultItem.style.borderRadius = "3px";
        resultItem.style.marginBottom = "5px";
        resultItem.style.cursor = "pointer";
        resultItem.style.backgroundColor = "#f9f9f9";

        // Highlight result on hover
        resultItem.addEventListener("mouseover", () => {
            resultItem.style.backgroundColor = "#e0e0e0";
        });
        resultItem.addEventListener("mouseout", () => {
            resultItem.style.backgroundColor = "#f9f9f9";
        });

        // Play selected song on click
        resultItem.addEventListener("click", () => {
            // Update the current song index
            currentSongIndex = allSongs.findIndex(s => s.file === song.file);

            // Load and play the selected song
            loadCurrentSong();

            // Hide the search box
            searchBoxContainer.style.display = "none";

            // Remove the selected result from resultsContainer
            resultItem.style.display = "none";

            // Add the song info below the current song
            const selectedSongInfo = document.createElement("div");
            selectedSongInfo.textContent = `Selected: ${song.file} - ${song.details}`;
            selectedSongInfo.style.marginTop = "10px";
            selectedSongInfo.style.color = "#555";
            currentSongDisplay.appendChild(selectedSongInfo);
        });

        resultsContainer.appendChild(resultItem);
    });

    // Append results to the search box container
    searchBoxContainer.appendChild(resultsContainer);
}

// Event listener for real-time search
searchBox.addEventListener("input", searchSongs);
  
  
    </script>
</body>
</html>
