<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified MP3 Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        h2 {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Unified Audio Player</h1>
    <h2 id="currentSong">Now Playing: </h2>
    <audio controls id="audioPlayer">
        <!-- Sources will be added dynamically -->
        Your browser does not support the audio element.
    </audio>
    <br>
    <button id="nextButton">Next</button>

    <script type="module">
        import { allSongs } from './audioFiles.js';

        let currentSongIndex = 0; // Keep track of the current song

        const audioPlayer = document.getElementById("audioPlayer");
        const nextButton = document.getElementById("nextButton");
        const currentSongDisplay = document.getElementById("currentSong");

        // Load the current song into the audio player and update display
        function loadCurrentSong() {
            audioPlayer.src = allSongs[currentSongIndex];
            currentSongDisplay.textContent = `Now Playing: ${allSongs[currentSongIndex].split('/').pop()}`;
            audioPlayer.play(); // Start playing the loaded song
        }

        // Play the next song
        function playNextSong() {
            currentSongIndex = (currentSongIndex + 1) % allSongs.length; // Loop back to the first song
            loadCurrentSong();
        }

        // Event listener for the Next button
        nextButton.addEventListener("click", playNextSong);

        // Automatically play the next song when the current one ends
        audioPlayer.addEventListener("ended", playNextSong);

        // Handle errors while loading songs
        audioPlayer.onerror = () => {
            alert("Error loading song. Skipping to the next one...");
            playNextSong();
        };

        // Keyboard shortcuts for navigation
        document.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight") playNextSong(); // Next song
        });

        // Load the initial song
        loadCurrentSong();
    </script>
</body>
</html>
